# Media Organizer 配置文件示例
# 将此文件复制到 ~/.config/mediaorganizer/config.toml

# 最大并发会话数
max_sessions = 10
# 是否保存会话日志
save_session_logs = true

[organize]
# 是否下载海报。默认: true
download_posters = true
# 海报尺寸。默认: "w780"
# 可选值: "w92", "w154", "w185", "w342", "w500", "w780", "original"
poster_size = "w780"
# 是否生成 NFO 文件。默认: true
generate_nfo = true
# 是否生成电影 NFO 文件。默认: true
generate_movie_nfo = true
# 是否生成 TV 剧集 NFO 文件。默认: true
generate_tv_episode_nfo = true
# 是否生成 TV 季 NFO 文件。默认: true
generate_tv_season_nfo = true
# 是否移动字幕文件和目录。默认: true
# 字幕文件和目录: .srt, .ass, .ssa, Sub/, Subs/, 字幕/ 等
move_subtitles = true
# 是否移动 Sample 视频和目录。默认: true
# Sample 视频: 文件名或目录名包含 "sample" 的视频文件
move_samples = true
# 是否移动 Extras 附加内容目录。默认: true
# Extras 目录: Extras/, Bonus/, Deleted Scenes/, Featurettes/ 等
move_extras = true
# 是否移动海报图片。默认: true
# 海报图片: poster.jpg, folder.png, cover.webp 等
move_posters = true
# 是否移动 OST 原声带目录。默认: true
# OST 目录: OST/, Soundtrack/, 原声带/, 音乐/, audio/, music/ 等
move_ost = true

[network]
# 是否启用代理。默认: false
# 设置为 true 后，下面的 proxy 配置才会生效
proxy_enabled = false
# HTTP/HTTPS 代理地址
# 例如: "http://127.0.0.1:7890" 或 "socks5://127.0.0.1:1080"
# 仅在 proxy_enabled = true 时生效
# proxy = "http://127.0.0.1:7890"

[ollama]
# AI 解析开关。默认关闭 (false)，仅使用本地解析（hunch + regex）
# 开启后，当本地解析失败时会调用 Ollama AI 作为后备
enabled = false
host = "localhost"
port = 11434
model = "qwen2.5:7b"
timeout = 60

[tmdb]
# TMDB API Key (必需)
# 获取方式: https://www.themoviedb.org/settings/api
# 支持 v3 API Key 和 v4 Bearer Token (以 "eyJ" 开头)
api_key = "your_tmdb_api_key_here"
language = "zh-CN"
